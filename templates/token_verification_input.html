<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Token | BCET Blockchain</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --blue-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            --accent-blue: #2563eb; 
        }
        
        body { 
            margin: 0; padding: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--blue-gradient); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; 
        }

        .card {
            background: #ffffff;
            width: 90%; max-width: 400px;
            padding: 45px 35px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .icon-circle {
            width: 70px; height: 70px;
            background: #eff6ff; color: #2563eb;
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 2.2rem;
            box-shadow: 0 10px 15px rgba(37, 99, 235, 0.1);
        }

        h2 { font-size: 1.6rem; color: #1e293b; font-weight: 700; margin: 0 0 10px; }
        p { color: #64748b; font-size: 0.85rem; margin-bottom: 30px; line-height: 1.4; }

        /* THE INPUT FIELD FOR PASTING */
        .styled-input {
            width: 100%; 
            padding: 18px; 
            border: 1px solid #e2e8f0; 
            border-radius: 15px;
            background: #f8fafc; 
            font-size: 1.1rem; 
            box-sizing: border-box; 
            text-align: center; 
            font-family: 'Courier New', monospace; 
            letter-spacing: 3px;
            margin-bottom: 20px; 
            color: #1e293b; 
            font-weight: 700;
            outline: none;
            transition: 0.3s;
        }

        .styled-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-verify {
            width: 100%; 
            background: var(--accent-blue); 
            color: white; 
            padding: 18px;
            border: none; 
            border-radius: 15px; 
            font-size: 1rem; 
            font-weight: 700;
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-verify:hover { 
            transform: translateY(-2px); 
            background: #1d4ed8; 
            box-shadow: 0 15px 25px rgba(37, 99, 235, 0.3);
        }

        .error-msg { 
            background: #fff1f2;
            color: #ef4444; 
            font-size: 0.8rem; 
            font-weight: 600; 
            margin-top: 20px; 
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #fee2e2;
        }

        /* Professional Quote Styling */
        .quote-container { 
            margin-top: 35px; 
            border-top: 1px solid #f1f5f9; 
            padding-top: 20px; 
        }

        .quote-text { 
            font-style: italic; 
            color: #94a3b8; 
            font-size: 0.8rem; 
            font-weight: 600; 
        }

        .quote-text span { color: var(--accent-blue); }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-circle">🔒</div>
        <h2>Secure Gateway</h2>
        <p>Please paste the 12-digit Blockchain Auth Token generated for your session to unlock the ballot.</p>

        <form action="/verify_token" method="POST">
            <input type="text" 
                   name="input_token" 
                   class="styled-input" 
                   placeholder="PASTE TOKEN HERE" 
                   required 
                   autocomplete="off">
                   
            <button type="submit" class="btn-verify">Verify & Access Ballot</button>
        </form>

        {% if error %}
            <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        <div class="quote-container">
            <p class="quote-text">" <span>One Student</span> — <span>One Vote</span> "</p>
        </div>
    </div>

</body>
</html>
