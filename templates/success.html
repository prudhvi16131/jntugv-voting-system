<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNTU-GV | Vote Successful</title>
    <style>
        :root { 
            --jntu-blue: #0066ff; 
            --success-bg: #f0fff4; 
            --success-border: #10b981; 
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f8fafc; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .success-card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 24px; 
            width: 90%; 
            max-width: 480px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            text-align: center; 
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .check-icon { 
            font-size: 60px; 
            margin-bottom: 15px; 
            display: block; 
            color: var(--success-border); 
        }
        
        h2 { color: var(--text-main); margin-bottom: 8px; font-weight: 800; font-size: 1.6rem; }
        .instruction { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; line-height: 1.5; }

        /* Professional Sidebar Receipt Card */
        .receipt-container { 
            background: var(--success-bg); 
            border-radius: 16px; 
            text-align: left;
            border-left: 6px solid var(--success-border); 
            padding: 1.5rem;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .receipt-label { 
            color: var(--text-muted); 
            font-size: 0.75rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1.2px; 
        }

        .receipt-value { 
            color: var(--text-main); 
            font-size: 1.8rem; 
            font-weight: 900; 
            letter-spacing: 4px; 
            margin-top: 8px; 
            font-family: 'Courier New', Courier, monospace; 
        }

        .warning-banner { 
            background: #fffbeb; 
            color: #92400e; 
            padding: 15px; 
            border-radius: 14px; 
            font-size: 0.8rem; 
            font-weight: 700; 
            margin-bottom: 30px; 
            border: 1px solid #fde68a;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }

        .btn { 
            padding: 1.1rem; 
            border-radius: 14px; 
            border: none; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 1rem; 
            transition: all 0.2s ease; 
            text-decoration: none;
            display: block;
        }

        .btn-verify { 
            background: var(--jntu-blue); 
            color: white; 
            box-shadow: 0 4px 14px rgba(0, 102, 255, 0.3);
        }

        .btn-home { 
            background: #f1f5f9; 
            color: #475569; 
        }

        .btn:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.1);
        }

        .btn:active { transform: translateY(0); }
    </style>
</head>
<body>

<div class="success-card">
    <span class="check-icon">✔</span>
    <h2>Vote Cast Successfully!</h2>
    <p class="instruction">Your ballot has been cryptographically signed and secured on the JNTU-GV Blockchain ledger.</p>

    <div class="receipt-container">
        <div class="receipt-label">Vote Receipt Code:</div>
        <div class="receipt-value">{{ receipt }}</div>
    </div>

    <div class="warning-banner">
        <span>⚠️</span>
        <div>IMPORTANT: Copy or screenshot this code now. You need it to verify your vote in the Audit Portal.</div>
    </div>

    <div class="btn-group">
        <a href="/audit" class="btn btn-verify">Verify on Blockchain Ledger</a>
        <a href="/" class="btn btn-home">Return to Home</a>
    </div>
</div>

</body>
</html>
