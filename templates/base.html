<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electoral Integrity Framework</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">
    <nav class="bg-indigo-600 p-4 text-white shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">E-Vote DApp</h1>
            <div class="space-x-4">
                <a href="/" class="hover:text-indigo-200">Cast Vote</a>
                <a href="/dashboard" class="hover:text-indigo-200">Dashboard</a>
                <a href="/ledger" class="hover:text-indigo-200">Ledger</a>
            </div>
        </div>
    </nav>
    <main class="flex-grow container mx-auto p-4 md:p-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
