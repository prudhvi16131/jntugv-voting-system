<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCET | Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); width: 90%; max-width: 380px; text-align: center; }
        .styled-input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-reset { width: 100%; background: #2563eb; color: white; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px;}
        #msg { margin-top: 15px; font-size: 0.85rem; font-weight: 600; }
        
        /* Input container for the eye icon */
        .input-group { position: relative; text-align: left; }
        .toggle-pwd { position: absolute; right: 15px; top: 25px; background: none; border: none; cursor: pointer; color: #64748b; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Reset Password</h2>
        <p style="color: #64748b; font-size: 0.85rem;">Verify your registered Hall Ticket and Email.</p>
        
        <input type="text" id="sid" class="styled-input" placeholder="Hall Ticket Number" required>
        
        <input type="email" id="email" class="styled-input" placeholder="Registered Email ID" required>
        
        <div class="input-group">
            <input type="password" id="pwd" class="styled-input" placeholder="New Password" required>
            <button type="button" class="toggle-pwd" onclick="toggleVisibility('pwd')">👁️</button>
        </div>

        <div class="input-group">
            <input type="password" id="pwd_confirm" class="styled-input" placeholder="Confirm New Password" required>
            <button type="button" class="toggle-pwd" onclick="toggleVisibility('pwd_confirm')">👁️</button>
        </div>

        <button class="btn-reset" onclick="handleReset()">Update Password</button>
        <p id="msg"></p>
        
        <a href="/login_page" style="color: #2563eb; text-decoration: none; font-size: 0.85rem; font-weight: 700;">Back to Login</a>
    </div>

    <script>
        function toggleVisibility(id) {
            const field = document.getElementById(id);
            field.type = field.type === "password" ? "text" : "password";
        }

        async function handleReset() {
            const sid = document.getElementById('sid').value.trim();
            const email = document.getElementById('email').value.trim();
            const pwd = document.getElementById('pwd').value;
            const pwd_confirm = document.getElementById('pwd_confirm').value;
            const m = document.getElementById('msg');

            if (pwd !== pwd_confirm) {
                m.innerText = "Passwords do not match!";
                m.style.color = 'red';
                return;
            }

            const res = await fetch('/reset_password', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `student_id=${sid}&email=${email}&password=${pwd}`
            });
            
            const data = await res.json();
            m.innerText = data.message;
            m.style.color = data.status === 'success' ? 'green' : 'red';
            
            // FIXED: Redirects to /login_page instead of root (/) to skip welcome screen
            if(data.status === 'success') setTimeout(()=> window.location.href='/login_page', 2000);
        }
    </script>
</body>
</html>
