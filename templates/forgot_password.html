<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BCET | Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); width: 90%; max-width: 380px; text-align: center; }
        .styled-input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-reset { width: 100%; background: #2563eb; color: white; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px;}
        #msg { margin-top: 15px; font-size: 0.85rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Reset Password</h2>
        <p style="color: #64748b; font-size: 0.85rem;">Only available if you have NOT voted yet.</p>
        <input type="text" id="sid" class="styled-input" placeholder="Hall Ticket Number" required>
        <input type="password" id="pwd" class="styled-input" placeholder="New Password" required>
        <button class="btn-reset" onclick="handleReset()">Update Password</button>
        <p id="msg"></p>
        <a href="/" style="color: #2563eb; text-decoration: none; font-size: 0.85rem;">Back to Login</a>
    </div>

    <script>
        async function handleReset() {
            const sid = document.getElementById('sid').value;
            const pwd = document.getElementById('pwd').value;
            const res = await fetch('/reset_password', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `student_id=${sid}&password=${pwd}`
            });
            const data = await res.json();
            const m = document.getElementById('msg');
            m.innerText = data.message;
            m.style.color = data.status === 'success' ? 'green' : 'red';
            if(data.status === 'success') setTimeout(()=> window.location.href='/', 2000);
        }
    </script>
</body>
</html>
