<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNTU-GV Secure Voting</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0062ff">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/927/927295.png">

    <style>
        :root { 
            --primary: #0062ff; 
            --secondary: #6c757d; 
            --bg: #f0f4f8; 
        }
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            color: #2d3748;
        }
        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); 
            width: 90%; 
            max-width: 420px; 
            text-align: center;
        }
        .header { margin-bottom: 2rem; }
        .logo-icon { 
            font-size: 3rem; 
            margin-bottom: 1rem; 
            display: inline-block;
        }
        h2 { margin: 0; color: #1a202c; font-size: 1.6rem; letter-spacing: -0.5px; }
        p.subtitle { color: #718096; margin-top: 8px; font-size: 0.95rem; }
        
        .form-group { text-align: left; margin-bottom: 1.5rem; }
        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 0.6rem; 
            color: #4a5568; 
            font-size: 0.9rem;
        }
        input, select { 
            width: 100%; 
            padding: 0.85rem; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 1rem; 
            transition: all 0.2s; 
            box-sizing: border-box;
            background-color: #f8fafc;
        }
        input:focus, select:focus { 
            border-color: var(--primary); 
            outline: none; 
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0, 98, 255, 0.1);
        }
        
        .btn-vote { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 1.1rem; 
            width: 100%; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: all 0.2s; 
            margin-top: 0.5rem;
            box-shadow: 0 4px 6px rgba(0, 98, 255, 0.2);
        }
        .btn-vote:hover { 
            background: #0052d6; 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 98, 255, 0.3);
        }

        .footer { 
            margin-top: 2rem; 
            font-size: 0.8rem; 
            color: #a0aec0; 
            border-top: 1px solid #edf2f7; 
            padding-top: 1.2rem; 
        }
        .highlight { color: #4a5568; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="logo-icon">🛡️</div>
        <h2>JNTU-GV E-Voting</h2>
        <p class="subtitle">Secure Blockchain-Based Selection</p>
    </div>

    <form action="/cast_vote" method="post">
        <div class="form-group">
            <label for="voter_id">Hall Ticket Number</label>
            <input type="text" id="voter_id" name="voter_id" placeholder="e.g., 24V11A0501" required>
        </div>

        <div class="form-group">
            <label for="candidate">Choose Your Candidate</label>
            <select id="candidate" name="candidate" required>
                <option value="" disabled selected>Select candidate from list</option>
                {% for c in config.candidates %}
                <option value="{{ c.name }}">{{ c.symbol }} {{ c.name }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn-vote">Confirm Secure Vote</button>
    </form>

    <div class="footer">
        Verified for JNTU-GV Students <br>
        <span class="highlight">24V11A0501 — 24V11A0580</span>
    </div>
</div>

</body>
</html>
