<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNTU-GV | Blockchain E-Voting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-blue: #2563eb;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--blue-gradient);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .main-card {
            background: white; width: 90%; max-width: 420px;
            padding: 40px 30px; border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); text-align: center;
        }

        /* CSS Shield Fix - No image needed */
        .shield-container {
            width: 70px; height: 85px;
            background: #f1f5f9;
            margin: 0 auto 15px;
            clip-path: polygon(50% 0%, 100% 20%, 100% 70%, 50% 100%, 0% 70%, 0% 20%);
            border: 4px solid #94a3b8;
            display: flex; align-items: center; justify-content: center;
        }
        .shield-inner {
            font-size: 30px; filter: grayscale(1);
        }

        h2 { font-size: 1.7rem; color: #1e293b; margin: 0; }
        .sub-heading { color: #64748b; font-size: 0.8rem; margin-bottom: 25px; }

        /* Timer Box Styling */
        .timer-box {
            background: #fff5f5; border: 1px solid #ffe3e3;
            border-radius: 15px; padding: 15px; margin-bottom: 25px;
        }

        .timer-label {
            font-size: 0.65rem; font-weight: 800; color: #ef4444;
            letter-spacing: 1px; text-transform: uppercase;
        }

        /* GUARANTEED FONT FIX */
        .timer-value {
            font-family: 'Playfair Display', serif !important;
            font-size: 2.2rem;
            color: #ef4444;
            font-style: italic !important;
            font-weight: 700;
            margin-top: 5px;
        }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 600; color: #475569; margin-bottom: 8px; }
        
        .styled-input {
            width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px;
            background: #f8fafc; font-size: 0.9rem; box-sizing: border-box;
        }

        .btn-confirm {
            width: 100%; background: var(--accent-blue); color: white; padding: 16px;
            border: none; border-radius: 12px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: 0.3s;
        }

        .verify-link { 
            display: inline-block; margin-top: 15px; color: var(--accent-blue); 
            text-decoration: underline; font-weight: 600; font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="shield-container"><span class="shield-inner">🛡️</span></div>
    
    <h2>JNTU-GV E-Voting</h2>
    <div class="sub-heading">Blockchain-Secured Student Election</div>

    <div class="timer-box">
        <div class="timer-label">Election Window Closing In:</div>
        <div id="countdown" class="timer-value">00h 00m 00s</div>
    </div>

    <form action="/cast_vote" method="POST">
        <div class="input-group">
            <label>Hall Ticket Number</label>
            <input type="text" name="student_id" class="styled-input" placeholder="e.g. 24V11A0501" required>
        </div>

        <div class="input-group">
            <label>Choose Your Candidate</label>
            <select name="candidate" class="styled-input" required>
                <option value="" disabled selected>Select candidate from list</option>
                {% for c in candidate_list %}
                <option value="{{ c.name }}">{{ c.symbol }} {{ c.name }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn-confirm">Confirm Secure Vote</button>
    </form>

    <a href="/audit" class="verify-link">Verify Your Vote Receipt</a>
</div>

<script>
    const targetDate = new Date("{{ settings.end_time }}").getTime();
    function updateCountdown() {
        const now = new Date().getTime();
        const diff = targetDate - now;
        if (diff <= 0) { document.getElementById("countdown").innerHTML = "CLOSED"; return; }
        const h = Math.floor((diff % (86400000)) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById("countdown").innerHTML = 
            (h < 10 ? "0"+h : h) + "h " + (m < 10 ? "0"+m : m) + "m " + (s < 10 ? "0"+s : s) + "s";
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>
</body>
</html>
