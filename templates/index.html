<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNTU-GV | Blockchain E-Voting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-blue: #2563eb;
            --card-bg: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--blue-gradient);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .main-card {
            background: var(--card-bg);
            width: 90%; max-width: 450px;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        /* Shield Icon (Updated to Pic 2 Style) */
        .shield-icon { 
            width: 80px; 
            margin-bottom: 10px; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        h2 { font-size: 1.8rem; margin: 0; color: #333; font-weight: 700; }
        .sub-heading { font-size: 0.8rem; color: #888; margin-bottom: 25px; }

        /* Timer Styling (Updated to Pic 1 Style) */
        .timer-box {
            background: #fff5f5;
            border: 1px solid #ffe3e3;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 30px;
        }

        .timer-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: #ff5a5a;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
        }

        .timer-value {
            font-family: 'Playfair Display', serif;
            font-size: 2.1rem;
            color: #ff5a5a;
            font-style: italic; /* Specific request from Pic 1 */
            margin-top: 5px;
        }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 600; color: #555; margin-bottom: 8px; }
        
        .styled-input {
            width: 100%; padding: 15px; border: 1px solid #e2e8f0; border-radius: 15px;
            background: #fcfcfc; font-size: 0.9rem; box-sizing: border-box; color: #333;
        }

        .btn-confirm {
            width: 100%; background: var(--accent-blue); color: white; padding: 18px;
            border: none; border-radius: 15px; font-size: 1rem; font-weight: 600;
            cursor: pointer; margin-top: 10px; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
            transition: 0.3s;
        }

        .btn-confirm:hover { transform: translateY(-2px); background: #1d4ed8; }
        .btn-confirm:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; transform: none; }

        .footer-info { margin-top: 30px; font-size: 0.7rem; color: #bbb; }
        
        /* Verify Link Styling (Pic 1 Style) */
        .verify-link { 
            display: inline-block; margin-top: 10px; color: var(--accent-blue); 
            text-decoration: underline; font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="main-card">
    <img src="https://img.icons8.com/fluency/100/shield.png" class="shield-icon" alt="E-Voting Symbol">
    
    <h2>JNTU-GV E-Voting</h2>
    <div class="sub-heading">Blockchain-Secured Student Election</div>

    <div class="timer-box">
        <div class="timer-label">Election Window Closing In:</div>
        <div id="countdown" class="timer-value">Loading...</div>
    </div>

    <form action="/cast_vote" method="POST">
        <div class="input-group">
            <label>Hall Ticket Number</label>
            <input type="text" name="student_id" class="styled-input" placeholder="e.g., 24V11A0501" required>
        </div>

        <div class="input-group">
            <label>Choose Your Candidate</label>
            <select name="candidate" class="styled-input" required>
                <option value="" disabled selected>Select candidate from list</option>
                {% for c in candidate_list %}
                <option value="{{ c.name }}">{{ c.symbol }} {{ c.name }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn-confirm" id="submitBtn">Confirm Secure Vote</button>
    </form>

    <div class="footer-info">
        Authorized Range: {{ settings.authorized_prefix }}{{ settings.range_start }} — {{ settings.authorized_prefix }}{{ settings.range_end }}<br>
        <a href="/audit" class="verify-link">Verify Your Vote Receipt</a>
    </div>
</div>

<script>
    const targetDate = new Date("{{ settings.end_time }}").getTime();
    function updateCountdown() {
        const now = new Date().getTime();
        const difference = targetDate - now;
        
        if (difference <= 0) {
            document.getElementById("countdown").innerHTML = "CLOSED";
            document.getElementById("submitBtn").disabled = true;
            return;
        }

        const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((difference % (1000 * 60)) / 1000);
        
        document.getElementById("countdown").innerHTML = 
            (hours < 10 ? "0" + hours : hours) + "h " + 
            (minutes < 10 ? "0" + minutes : minutes) + "m " + 
            (seconds < 10 ? "0" + seconds : seconds) + "s";
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>
</body>
</html>
