<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNTU-GV | Blockchain Voting Portal</title>
    <style>
        :root {
            --jntu-blue: #1e3a8a;
            --accent: #2563eb;
            --bg: #f1f5f9;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .voting-card {
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .header-img {
            width: 80px;
            margin-bottom: 1rem;
        }

        h2 {
            color: var(--jntu-blue);
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1e293b;
        }

        input[type="text"], select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background-color: var(--jntu-blue);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--accent);
        }

        .footer {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="voting-card">
    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/1/1d/JNTU_Gurajada_Vizianagaram_logo.png/220px-JNTU_Gurajada_Vizianagaram_logo.png" alt="JNTU-GV Logo" class="header-img">
    <h2>Student Voting</h2>
    <p class="subtitle">Secure Blockchain-Based Election</p>

    <form action="/cast_vote" method="POST">
        <div class="form-group">
            <label for="student_id">Roll Number</label>
            <input type="text" id="student_id" name="student_id" placeholder="Enter Roll Number" required>
        </div>

        <div class="form-group">
            <label for="candidate">Select Candidate</label>
            <select id="candidate" name="candidate" required>
                <option value="" disabled selected>Select a representative</option>
                {% for c in candidates %}
                <option value="{{ c }}">{{ c }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn-submit">Cast Secure Vote</button>
    </form>

    <div class="footer">
        Powered by SHA-256 Blockchain Technology
    </div>
</div>

</body>
</html>
