<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNTU-GV Secure Voting</title>
    <style>
        :root { --primary: #0062ff; --bg: #f0f4f8; --danger: #e53e3e; }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
        }
        .card { 
            background: white; padding: 2.5rem; border-radius: 20px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); 
            width: 90%; max-width: 420px; text-align: center;
        }
        #timer-container {
            background: #fff5f5; padding: 15px; border-radius: 12px;
            margin: 20px 0; border: 1px solid #fed7d7;
        }
        #timer { font-weight: 800; color: var(--danger); font-size: 1.5rem; display: block; }
        .timer-label { font-size: 0.75rem; color: #c53030; font-weight: 700; text-transform: uppercase; }
        .form-group { text-align: left; margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.6rem; color: #4a5568; }
        input, select { 
            width: 100%; padding: 0.85rem; border: 2px solid #e2e8f0; 
            border-radius: 12px; font-size: 1rem; box-sizing: border-box;
        }
        .btn-vote { 
            background: var(--primary); color: white; border: none; 
            padding: 1.1rem; width: 100%; border-radius: 12px; 
            font-weight: 700; font-size: 1.1rem; cursor: pointer; 
        }
        .btn-vote:disabled { background: #cbd5e0; cursor: not-allowed; }
        .audit-link { 
            margin-top: 15px; display: block; 
            color: var(--primary); font-size: 0.9rem; 
            text-decoration: none; font-weight: 600; 
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🛡️</div>
        <h2 style="margin:0;">JNTU-GV E-Voting</h2>
        <p style="color: #718096; font-size: 0.9rem;">Blockchain-Secured Student Election</p>
        
        <div id="timer-container">
            <span class="timer-label">Time Remaining in Window:</span>
            <span id="timer">Loading...</span>
        </div>
    </div>

    {% if status == "live" %}
    <form action="/cast_vote" method="post">
        <div class="form-group">
            <label>Hall Ticket Number</label>
            <input type="text" name="voter_id" placeholder="e.g., 24V11A0501" required>
        </div>

        <div class="form-group">
            <label>Choose Your Candidate</label>
            <select name="candidate" required>
                <option value="" disabled selected>Select from list</option>
                {% for c in config.candidates %}
                <option value="{{ c.name }}">{{ c.symbol }} {{ c.name }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" id="voteBtn" class="btn-vote">Confirm Secure Vote</button>
    </form>
    {% elif status == "waiting" %}
        <div style="background: #fffaf0; padding: 15px; border-radius: 10px; color: #9c4221; font-weight: 600;">
            Voting has not started yet.
        </div>
    {% else %}
        <div style="background: #fff5f5; padding: 15px; border-radius: 10px; color: #c53030; font-weight: 600;">
            Election Window Closed.
        </div>
    {% endif %}

    <a href="/audit" class="audit-link">🔍 Verify Your Vote Receipt</a>

    <div style="margin-top: 2rem; font-size: 0.8rem; color: #a0aec0;">
        Authorized Range: 24V11A0501 — 24V11A0580
    </div>
</div>

<script>
    // Uses remaining seconds from server logic
    let timeLeft = {{ remaining_s | int }};

    function updateDisplay() {
        if (timeLeft <= 0) {
            document.getElementById("timer").innerHTML = "00h 00m 00s";
            if(document.getElementById("voteBtn")) document.getElementById("voteBtn").disabled = true;
            return;
        }

        const h = Math.floor(timeLeft / 3600);
        const m = Math.floor((timeLeft % 3600) / 60);
        const s = Math.floor(timeLeft % 60);

        document.getElementById("timer").innerHTML = 
            (h < 10 ? "0" + h : h) + "h " + 
            (m < 10 ? "0" + m : m) + "m " + 
            (s < 10 ? "0" + s : s) + "s";
        
        timeLeft--;
    }

    if (timeLeft > 0) {
        setInterval(updateDisplay, 1000);
        updateDisplay();
    } else {
        document.getElementById("timer").innerHTML = "00h 00m 00s";
    }
</script>

</body>
</html>
