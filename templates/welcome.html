<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | BCET Voting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; background-color: #020617; }
        
        /* Layer 1 & 2 Combined: The Campus Photo with Navy Tint */
        .bg-wrapper {
            position: fixed; 
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* This combines the Pic 2 Navy style directly ON TOP of the Pic 1 Campus image */
            background: 
                linear-gradient(
                    135deg, 
                    rgba(15, 23, 42, 0.9) 0%,   /* Dark Navy */
                    rgba(2, 6, 23, 0.95) 100%   /* Deep Night Blue */
                ),
                url('{{ url_for("static", filename="welcome-bg.jpg") }}');
            background-size: cover; 
            background-position: center;
            z-index: -1;
            /* Makes the campus photo look cinematic */
            filter: contrast(1.1) brightness(0.9);
        }

        .main-content {
            position: relative; 
            height: 100%; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            text-align: center; 
            color: white; 
            padding: 20px;
        }

        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); } 50% { filter: drop-shadow(0 0 30px rgba(255,255,255,0.5)); } }

        /* INCREASED LOGO IMPACT */
        .college-logo {
            width: 200px; 
            height: auto;
            margin-bottom: 25px;
            animation: fadeInUp 1s ease-out, float 4s ease-in-out infinite, glow 3s ease-in-out infinite;
        }

        .college-name {
            font-size: 2.5rem; 
            font-weight: 800; 
            letter-spacing: 1.5px;
            text-transform: uppercase; 
            margin-bottom: 12px; 
            animation: fadeInUp 1.2s ease-out;
            line-height: 1.2;
            max-width: 900px;
            /* Text Shadow ensures visibility over the campus image */
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .sub-text { 
            font-size: 1.1rem; 
            color: #cbd5e1; 
            margin-bottom: 50px; 
            animation: fadeInUp 1.4s ease-out; 
            letter-spacing: 1px;
            font-weight: 400;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .enter-btn {
            padding: 20px 60px; 
            background: #ffffff; 
            color: #0f172a; 
            text-decoration: none; 
            border-radius: 60px; 
            font-weight: 800;
            text-transform: uppercase; 
            transition: 0.3s ease; 
            animation: fadeInUp 1.6s ease-out;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            letter-spacing: 1px;
            font-size: 1.05rem;
        }

        .enter-btn:hover { 
            transform: translateY(-5px); 
            background: #f1f5f9; 
            box-shadow: 0 15px 40px rgba(255,255,255,0.15); 
        }

        .footer { 
            position: absolute; 
            bottom: 30px; 
            font-size: 0.7rem; 
            color: #94a3b8; 
            font-weight: 600;
            animation: fadeInUp 2s ease-out; 
            text-transform: uppercase;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="bg-wrapper"></div>
    
    <div class="main-content">
        <img src="{{ url_for('static', filename='logo.png') }}" class="college-logo" alt="BCET Logo">
        
        <div class="college-name">BEHARA COLLEGE OF<br>ENGINEERING AND TECHNOLOGY</div>
        <div class="sub-text">Digital India Initiative | Secure Blockchain Voting Portal</div>
        
        <a href="/login_page" class="enter-btn">Initialize Voting System</a>

        <div class="footer">
            Administered by BCET Election Commission 2026
        </div>
    </div>
</body>
</html>
