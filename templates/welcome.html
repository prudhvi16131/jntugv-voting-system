<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | BCET Voting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Background with Blue Gradient Overlay */
        .bg-container {
            position: fixed; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center; filter: brightness(0.3);
        }

        .overlay {
            position: relative; height: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: linear-gradient(to bottom, rgba(30, 64, 175, 0.6), rgba(15, 23, 42, 0.9));
            text-align: center; color: white; padding: 20px;
        }

        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .college-logo {
            width: 130px; margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.4));
            animation: fadeInUp 1s ease-out, float 3s ease-in-out infinite;
        }

        .college-name {
            font-size: 2.2rem; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 10px; animation: fadeInUp 1.2s ease-out;
        }

        .sub-text { font-size: 1rem; color: #cbd5e1; margin-bottom: 40px; animation: fadeInUp 1.4s ease-out; }

        .enter-btn {
            padding: 16px 45px; background: white; color: #1e3a8a;
            text-decoration: none; border-radius: 50px; font-weight: 700;
            text-transform: uppercase; transition: 0.3s; animation: fadeInUp 1.6s ease-out;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .enter-btn:hover { transform: scale(1.05); background: #f1f5f9; box-shadow: 0 15px 30px rgba(255,255,255,0.2); }

        .footer { position: absolute; bottom: 30px; font-size: 0.75rem; color: #94a3b8; animation: fadeInUp 2s ease-out; }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="overlay">
        <img src="{{ url_for('static', filename='logo.png') }}" class="college-logo" alt="BCET Logo">
        <div class="college-name">BEHARA COLLEGE OF ENGINEERING AND TECHNOLOGY</div>
        <div class="sub-text">Digital India Initiative | Secure Blockchain Voting Portal</div>
        
        <a href="/signup_page" class="enter-btn">Initialize Voting System</a>

        <div class="footer">
            Administered by BCET Election Commission 2026
        </div>
    </div>
</body>
</html>
