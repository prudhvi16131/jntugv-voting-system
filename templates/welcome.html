<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | BCET Voting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; background-color: #0f172a; }
        
        /* Background using your local file */
        .bg-container {
            position: fixed; width: 100%; height: 100%;
            /* Make sure your generated image is saved as welcome-bg.jpg in the static folder */
            background: url('{{ url_for("static", filename="welcome-bg.jpg") }}');
            background-size: cover; 
            background-position: center;
            z-index: -1;
        }

        /* Professional Color Grading Overlay (Darker & Less Bright) */
        .overlay {
            position: relative; 
            height: 100%; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            /* High-end cinematic dark blue overlay */
            background: radial-gradient(circle, rgba(15, 23, 42, 0.75) 0%, rgba(15, 23, 42, 0.95) 100%);
            text-align: center; 
            color: white; 
            padding: 20px;
        }

        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 15px rgba(255,255,255,0.4)); } 50% { filter: drop-shadow(0 0 30px rgba(255,255,255,0.6)); } }

        /* INCREASED LOGO SIZE */
        .college-logo {
            width: 220px; /* Signficantly increased size */
            height: auto;
            margin-bottom: 25px;
            animation: fadeInUp 1s ease-out, float 4s ease-in-out infinite, glow 3s ease-in-out infinite;
        }

        .college-name {
            font-size: 2.5rem; /* Slightly larger text */
            font-weight: 800; 
            letter-spacing: 2.5px;
            text-transform: uppercase; 
            margin-bottom: 12px; 
            animation: fadeInUp 1.2s ease-out;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .sub-text { 
            font-size: 1.1rem; 
            color: #94a3b8; /* Muted slate color for professional feel */
            margin-bottom: 45px; 
            animation: fadeInUp 1.4s ease-out; 
            letter-spacing: 1px;
        }

        .enter-btn {
            padding: 18px 55px; 
            background: white; 
            color: #0f172a; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: 700;
            text-transform: uppercase; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            animation: fadeInUp 1.6s ease-out;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            letter-spacing: 1px;
        }

        .enter-btn:hover { 
            transform: scale(1.08) translateY(-3px); 
            background: #f8fafc; 
            box-shadow: 0 15px 40px rgba(255,255,255,0.2); 
        }

        .footer { 
            position: absolute; 
            bottom: 30px; 
            font-size: 0.8rem; 
            color: #475569; 
            font-weight: 600;
            animation: fadeInUp 2s ease-out; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="overlay">
        <img src="{{ url_for('static', filename='logo.png') }}" class="college-logo" alt="BCET Logo">
        
        <div class="college-name">BEHARA COLLEGE OF ENGINEERING AND TECHNOLOGY</div>
        <div class="sub-text">Digital India Initiative | Secure Blockchain Voting Portal</div>
        
        <a href="/signup_page" class="enter-btn">Initialize Voting System</a>

        <div class="footer">
            Administered by BCET Election Commission 2026
        </div>
    </div>
</body>
</html>
