<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCET | Verification Failed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .error-card {
            background: white; padding: 50px 35px; border-radius: 40px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); width: 90%; max-width: 400px;
        }
        .icon-circle {
            width: 80px; height: 80px; background: #fff1f2; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 25px; color: #ef4444; border: 2px solid #fee2e2;
        }
        h2 { color: #0f172a; margin: 0; font-weight: 800; font-size: 1.6rem; }
        p { color: #64748b; font-size: 0.95rem; line-height: 1.6; margin: 20px 0 35px; }
        .btn-retry {
            display: block; background: #2563eb; color: white; padding: 18px;
            text-decoration: none; border-radius: 18px; font-weight: 700; 
            transition: 0.3s; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }
        .btn-retry:hover { background: #1d4ed8; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="icon-circle">
            <svg width="40" height="40" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                <path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995z"/>
            </svg>
        </div>
        <h2>Verification Failed</h2>
        <p>The Hall Ticket number or Password entered is incorrect, or this ID has not been registered yet.</p>
        <a href="/" class="btn-retry">Try Again</a>
    </div>
</body>
</html>
