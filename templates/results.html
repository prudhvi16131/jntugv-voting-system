<!DOCTYPE html>
<html>
<head>
    <title>JNTU-GV Admin Results</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; margin: 50px auto; width: 50%; border-radius: 10px; box-shadow: 0px 0px 10px gray; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; }
        th { background-color: #007bff; color: white; }
        .winner { color: green; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>JNTU-GV Election Standings</h2>
        <p class="winner">Current Leader: {{ winner }}</p>
        <table>
            <tr>
                <th>Candidate</th>
                <th>Votes Received</th>
            </tr>
            {% for name, count in tally.items() %}
            <tr>
                <td>{{ name }}</td>
                <td>{{ count }}</td>
            </tr>
            {% endfor %}
        </table>
        <br>
        <a href="/">Return to Voting Page</a>
    </div>
</body>
</html>
