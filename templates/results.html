<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JNTU-GV Admin | Interactive Dashboard</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 10px; flex: 1; }
        .btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; width: 100%; margin-top: 10px; }
        .btn-green { background: #10b981; }
        .btn-blue { background: #2563eb; }
    </style>
</head>
<body>

<div style="max-width: 500px; margin: 0 auto;">
    <h2>Admin Control Panel</h2>

    <div class="card">
        <h3>Candidate Management</h3>
        <div id="candidate-list">
            {% for c in settings.candidates %}
            <div class="row candidate-row">
                <input type="text" class="c-name" value="{{ c.name }}">
                <input type="text" class="c-symbol" style="flex: 0.3;" value="{{ c.symbol }}">
            </div>
            {% endfor %}
        </div>
        <button class="btn btn-green" onclick="saveCandidates()">Save & Sync Candidates</button>
    </div>

    <div class="card">
        <h3>Election Schedule</h3>
        <label>Start Time:</label>
        <input type="datetime-local" id="start-time" value="{{ settings.start_time }}" class="row">
        <label>End Time:</label>
        <input type="datetime-local" id="end-time" value="{{ settings.end_time }}" class="row">
        <button class="btn btn-blue" onclick="saveSchedule()">Update Timing</button>
    </div>
</div>

<script>
    function saveCandidates() {
        const rows = document.querySelectorAll('.candidate-row');
        const candidates = Array.from(rows).map(row => ({
            name: row.querySelector('.c-name').value,
            symbol: row.querySelector('.c-symbol').value
        }));

        fetch('/update_candidates', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({candidates})
        }).then(res => alert("Election List Updated!"));
    }

    function saveSchedule() {
        const start = document.getElementById('start-time').value;
        const end = document.getElementById('end-time').value;

        fetch('/update_schedule', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({start, end})
        }).then(res => alert("Schedule Saved!"));
    }
</script>

</body>
</html>
