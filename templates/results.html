<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | JNTU-GV</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #2563eb; 
            --danger: #ef4444; 
            --success: #10b981;
            --bg: #f8fafc;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card h3 { margin: 0; font-size: 0.8rem; color: #64748b; text-transform: uppercase; }
        .card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: 700; color: #1e293b; }

        /* Chart & Log Section */
        .main-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        
        /* Table Styling */
        .log-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .log-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        .log-table th { text-align: left; padding: 12px; border-bottom: 2px solid #f1f5f9; color: #64748b; }
        .log-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        /* Buttons */
        .btn-reset { 
            background: var(--danger); color: white; border: none; padding: 12px 24px; 
            border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <div>
            <h1 style="margin: 0;">Admin Dashboard</h1>
            <p style="color: #64748b; margin: 5px 0 0;">Last Updated: {{ current_time }}</p>
        </div>
        <button onclick="resetElection()" class="btn-reset">Master Reset Election</button>
    </header>

    <div class="stats-grid">
        <div class="card">
            <h3>Current Winner</h3>
            <p style="color: var(--primary);">{{ winner }}</p>
        </div>
        <div class="card">
            <h3>Total Turnout</h3>
            <p>{{ turnout }}%</p>
        </div>
        <div class="card">
            <h3>Election Status</h3>
            <p style="color: var(--success);">LIVE</p>
        </div>
    </div>

    <div class="main-grid">
        <div class="card">
            <h3>Vote Distribution</h3>
            <canvas id="voteChart" style="margin-top: 20px;"></canvas>
        </div>

        <div class="log-container">
            <h3 style="margin: 0;">Security Alerts</h3>
            <table class="log-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Hall Ticket</th>
                        <th>Reason</th>
                        <th>Device IP</th> </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr>
                        <td>{{ log.time }}</td>
                        <td style="color: var(--danger); font-weight: 600;">{{ log.id }}</td>
                        <td>{{ log.reason }}</td>
                        <td style="font-family: monospace; color: #64748b;">{{ log.ip }}</td> </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Initialize Vote Chart
    const ctx = document.getElementById('voteChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: [{% for name in vote_counts.keys() %}"{{ name }}",{% endfor %}],
            datasets: [{
                label: 'Votes',
                data: [{% for count in vote_counts.values() %}{{ count }},{% endfor %}],
                backgroundColor: ['#2563eb', '#7c3aed', '#db2777', '#ea580c'],
                borderRadius: 8
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });

    // Master Reset Function
    async function resetElection() {
        if (confirm("DANGER: This will wipe all blockchain data and votes. Are you sure?")) {
            const response = await fetch('/reset_election', { method: 'POST' });
            if (response.ok) {
                alert("Blockchain Reset Successful.");
                window.location.reload();
            }
        }
    }
</script>

</body>
</html>
