<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNTU-GV Admin | Election Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --purple: #9333ea;
            --green: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 500px; margin: 0 auto; text-align: center; }
        
        h2 { font-weight: 700; margin-bottom: 5px; }
        .subtitle { font-size: 0.75rem; color: #64748b; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }

        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: left; }
        .section-title { font-size: 0.85rem; font-weight: 700; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }

        /* Input Row Styles */
        .row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        input { 
            padding: 12px; 
            border: 1.5px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 0.9rem; 
            background: #fcfcfc;
            transition: 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); background: #fff; }

        .btn { 
            width: 100%; padding: 15px; border: none; border-radius: 15px; 
            font-weight: 700; cursor: pointer; font-size: 0.9rem; margin-top: 10px; color: white; transition: 0.3s; 
        }
        .btn-add { background: #64748b; margin-bottom: 10px; }
        .btn-green { background: var(--green); }
        .btn-blue { background: var(--primary); }
        .btn-orange { background: #f59e0b; }
        
        .delete-btn { 
            background: #fee2e2; color: var(--danger); border: none; 
            padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; 
        }
        .delete-btn:hover { background: var(--danger); color: white; }

        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-mini { background: #fff; padding: 15px; border-radius: 20px; border-left: 5px solid var(--primary); text-align: left; }
        .stat-label { font-size: 0.6rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        .stat-val { font-size: 1.1rem; font-weight: 700; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>JNTU-GV Admin Dashboard</h2>
    <div class="subtitle">Interactive Blockchain Management</div>

    <div class="stats-grid">
        <div class="stat-mini">
            <div class="stat-label">Leading</div>
            <div class="stat-val" style="color: var(--primary);">{{ winner if winner else "TBD" }}</div>
        </div>
        <div class="stat-mini" style="border-left-color: var(--purple);">
            <div class="stat-label">Turnout</div>
            <div class="stat-val" style="color: var(--purple);">{{ turnout }}%</div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">
            <span>Candidate & Symbol Management</span>
        </div>
        
        <div id="candidate-list">
            {% for c in settings.candidates %}
            <div class="row candidate-item">
                <input type="text" class="edit-name" value="{{ c.name }}" placeholder="Name" style="flex: 2;">
                <input type="text" class="edit-symbol" value="{{ c.symbol }}" placeholder="Icon" style="flex: 0.5; text-align: center;">
                <button type="button" class="delete-btn" onclick="this.parentElement.remove()">✕</button>
            </div>
            {% endfor %}
        </div>

        <button class="btn btn-add" onclick="addNewCandidate()">+ Add New Candidate Row</button>
        <button class="btn btn-green" onclick="saveCandidates()">Synchronize & Save List</button>
    </div>

    <div class="card">
        <div class="section-title">Election Schedule (IST)</div>
        <div class="row" style="flex-direction: column; align-items: stretch;">
            <label style="font-size: 0.7rem; font-weight: 600; color: #64748b;">START TIME</label>
            <input type="datetime-local" id="start_time" value="{{ settings.start_time }}" style="margin-bottom: 15px;">
            
            <label style="font-size: 0.7rem; font-weight: 600; color: #64748b;">END TIME</label>
            <input type="datetime-local" id="end_time" value="{{ settings.end_time }}">
        </div>
        <button class="btn btn-blue" onclick="saveSchedule()">Update Election Window</button>
        <button class="btn btn-orange" onclick="alert('Manual Override: Blockchain clock stopped.')">🛑 Stop Clock Now</button>
    </div>
</div>

<script>
    // Injects a new blank candidate row
    function addNewCandidate() {
        const list = document.getElementById('candidate-list');
        const div = document.createElement('div');
        div.className = 'row candidate-item';
        div.innerHTML = `
            <input type="text" class="edit-name" placeholder="New Candidate" style="flex: 2;">
            <input type="text" class="edit-symbol" value="🗳️" style="flex: 0.5; text-align: center;">
            <button type="button" class="delete-btn" onclick="this.parentElement.remove()">✕</button>
        `;
        list.appendChild(div);
    }

    // Sends the full list of candidates to app.py
    function saveCandidates() {
        const items = document.querySelectorAll('.candidate-item');
        const candidates = Array.from(items).map(item => ({
            name: item.querySelector('.edit-name').value,
            symbol: item.querySelector('.edit-symbol').value
        })).filter(c => c.name.trim() !== "");

        fetch('/update_settings', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ candidates: candidates })
        })
        .then(res => res.json())
        .then(data => alert("Success: Election List Synced to Blockchain!"));
    }

    // Sends the start/end times to app.py
    function saveSchedule() {
        const start = document.getElementById('start_time').value;
        const end = document.getElementById('end_time').value;

        fetch('/update_settings', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ start: start, end: end })
        })
        .then(res => res.json())
        .then(data => alert("Success: Timing Window Updated!"));
    }
</script>

</body>
</html>
