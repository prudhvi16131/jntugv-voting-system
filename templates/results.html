<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNTU-GV | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; justify-content: center; padding: 20px; }
        .dashboard-container { width: 100%; max-width: 500px; }
        .header-card { background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .section-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        
        /* Candidate Row Styling */
        .vote-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .input-box { padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 0.9rem; }
        .name-input { flex: 2; color: #1e293b; font-weight: 600; }
        .symbol-input { flex: 0.5; text-align: center; font-size: 1.2rem; }
        .vote-count-display { font-weight: 700; color: #2563eb; min-width: 75px; text-align: right; font-size: 0.9rem; }

        /* Action Buttons */
        .btn-action { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: 600; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .btn-sync { background: #10b981; color: white; }
        .btn-timing { background: #2563eb; color: white; }
        .btn-stop { background: #ef4444; color: white; }
        .btn-add { background: #64748b; color: white; }

        /* Inputs */
        label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 5px; }
        input[type="datetime-local"] { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; }

        /* Official Documentation Box */
        .doc-column { background: #f1f5f9; border: 2px dashed #cbd5e1; padding: 20px; border-radius: 20px; text-align: center; margin-top: 20px; }
        .btn-download { display: block; background: #1e293b; color: white; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 600; margin-top: 15px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header-card">
        <h1>JNTU-GV Admin Dashboard</h1>
    </div>

    <div class="section-card">
        <h3>Candidate Management & Live Tally</h3>
        <div id="candidate-list">
            {% for name, count in vote_counts.items() %}
            <div class="vote-row">
                <input type="text" class="input-box name-input" value="{{ name }}">
                <input type="text" class="input-box symbol-input" value="{% for c in settings.candidates %}{% if c.name == name %}{{ c.symbol }}{% endif %}{% endfor %}">
                <div class="vote-count-display">{{ count }} Votes</div>
            </div>
            {% endfor %}
        </div>
        
        <button class="btn-action btn-add" onclick="addRow()">+ Add New Candidate Row</button>
        <button class="btn-action btn-sync" onclick="syncCandidates()">Synchronize & Save Election List</button>

        <div class="doc-column">
            <h4 style="margin: 0; color: #1e293b;">Official Documentation</h4>
            <p style="font-size: 0.75rem; color: #64748b; margin: 8px 0;">Generate verified blockchain PDF report.</p>
            <a href="/download-results/{{ settings.admin_secret }}" class="btn-download">📥 Download Results PDF</a>
        </div>
    </div>

    <div class="section-card">
        <h3>Election Schedule (IST)</h3>
        <label>Start Polling</label>
        <input type="datetime-local" id="start-time" value="{{ settings.start_time }}">
        
        <label>End Polling</label>
        <input type="datetime-local" id="end-time" value="{{ settings.end_time }}">

        <button class="btn-action btn-timing" onclick="updateTiming()">Update Timing Window</button>
        <button class="btn-action btn-stop" onclick="stopElection()">Stop Clock & End Election Now</button>
    </div>

    <div class="section-card" style="border: 2px solid #ef4444; background: #fff1f2;">
        <button class="btn-action btn-stop" style="margin: 0;" onclick="resetProject()">⚠️ Factory Reset Project</button>
    </div>
</div>

<script>
    // 1. Add a new candidate row locally
    function addRow() {
        const div = document.createElement('div');
        div.className = 'vote-row';
        div.innerHTML = `
            <input type="text" class="input-box name-input" placeholder="Name">
            <input type="text" class="input-box symbol-input" placeholder="👤">
            <div class="vote-count-display">0 Votes</div>
        `;
        document.getElementById('candidate-list').appendChild(div);
    }

    // 2. Sync UI data with Python Server
    function syncCandidates() {
        const rows = document.querySelectorAll('.vote-row');
        const candidates = Array.from(rows).map(row => ({
            name: row.querySelector('.name-input').value,
            symbol: row.querySelector('.symbol-input').value || "👤"
        }));
        
        fetch('/sync_candidates', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({candidates: candidates})
        }).then(() => {
            alert("Election list updated successfully!");
            location.reload();
        });
    }

    // 3. Update Election Times
    function updateTiming() {
        const start = document.getElementById('start-time').value;
        const end = document.getElementById('end-time').value;
        
        fetch('/update_timing', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({start: start, end: end})
        }).then(() => {
            alert("Polling times updated!");
            location.reload();
        });
    }

    // 4. Force End Election
    function stopElection() {
        if(confirm("This will immediately disable voting for all students. Continue?")) {
            fetch('/stop_election', { method: 'POST' })
            .then(() => {
                alert("Election ended.");
                location.reload();
            });
        }
    }

    // 5. Complete Reset
    function resetProject() {
        if(confirm("CRITICAL: This deletes ALL votes and clears the blockchain. Are you absolutely sure?")) {
            fetch('/reset_election', { method: 'POST' })
            .then(() => {
                alert("System Reset Complete.");
                location.reload();
            });
        }
    }
</script>
</body>
</html>
